name: IndexNow

on:
  push:
    branches: [main]
    paths:
      - 'public/sitemap.xml'
      - 'src/**'
      - 'index.html'
  workflow_dispatch:

jobs:
  submit:
    # Wait a bit so Vercel has time to finish deploying before we ping search
    # engines. IndexNow doesn't require the URLs to be live at submit time,
    # but fresher crawls are nicer.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Wait for Vercel deploy
        run: sleep 90

      - name: Submit URLs to IndexNow
        # The script itself bails early when VITE_SITE_ENV != "production",
        # but gating here saves a setup-node run on staging deploys.
        if: vars.VITE_SITE_ENV == 'production'
        run: node scripts/indexnow-submit.mjs
        env:
          VITE_SITE_ENV: ${{ vars.VITE_SITE_ENV }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL }}
